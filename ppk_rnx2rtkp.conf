# RTKLIB rnx2rtkp configuration generated for Emlid Studio equivalence
# Use base observations: On

pos1-posmode       =kinematic      # (0:single,1:dgps,2:kinematic,3:static,4:movingbase,5:fixed,6:ppp-kine,7:ppp-static)
pos1-frequency     =l1+l2          # (1:l1,2:l1+l2,3:l1+l2+l5)
pos1-soltype       =forward        # (0:forward,1:backward,2:combined)
pos1-elmask        =15             # (deg)
pos1-snrmask_r     =on             # (0:off,1:on)
pos1-snrmask_b     =on             # (0:off,1:on)
pos1-snrmask_L1    =35,35,35,35,35,35,35,35,35
pos1-snrmask_L2    =35,35,35,35,35,35,35,35,35
pos1-snrmask_L5    =35,35,35,35,35,35,35,35,35
pos1-dynamics      =off            # (0:off,1:on)
pos1-tidecorr      =off            # (0:off,1:on)
pos1-ionoopt       =brdc           # (0:off,1:brdc,2:sbas,3:dual-freq,4:est-stec)
pos1-tropopt       =saas           # (0:off,1:saas,2:sbas,3:est-ztd,4:est-ztdgrad)
pos1-sateph        =brdc           # (0:brdc,1:precise,2:brdc+sbas,3:brdc+ssrapc,4:brdc+ssrcom)
pos1-exclsats      =               # (prn ...)
pos1-navsys        =63             # (1:gps+2:sbas+4:glo+8:gal+16:qzs+32:comp)

pos2-armode        =fix-and-hold   # (0:off,1:continuous,2:instantaneous,3:fix-and-hold)
pos2-gloarmode     =on             # (0:off,1:on,2:autocal)
# BeiDou AR on/off not available in this version

out-solformat      =llh            # (0:llh,1:xyz,2:enu,3:nmea)
out-outhead        =on             # (0:off,1:on)
out-outopt         =on             # (0:off,1:on)
out-timesys        =gpst           # (0:gpst,1:utc,2:jst)
out-timeform       =hms            # (0:tow,1:hms)
out-timendec       =3
out-degform        =deg            # (0:deg,1:dms)
out-fieldsep       =
out-height         =ellipsoidal    # (0:ellipsoidal,1:geodetic)
out-geoid          =internal       # (0:internal,1:egm96,2:egm08_2.5,3:egm08_1,4:gsi2000)
out-solstatic      =all            # (0:all,1:single)
out-nmeaintv1      =0              # (s)
out-nmeaintv2      =0              # (s)
out-outstat        =off            # (0:off,1:state,2:residual)

# Debug trace
file-tracefile     =               # (empty to disable)
